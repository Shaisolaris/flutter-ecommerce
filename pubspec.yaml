name: flutter_ecommerce
description: Flutter e-commerce app — product catalog, cart, Stripe checkout, order tracking, wishlist, search with filters, BLoC state management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.0
  equatable: ^2.0.0
  go_router: ^14.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
